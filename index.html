<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmon Copper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎼 Harmon Cooper Western</h1>
    <p class="sous-titre">Touche un bouton pour jouer le son. Re-touche le même bouton pour l'arrêter.</p>
  </header>

  <main id="categories">
    <!-- Les catégories et boutons sont générés automatiquement par script.js
         à partir de la liste SOUNDS définie en haut de ce fichier. -->
  </main>

  <footer>
    <button id="stop-all">⏹ Tout arrêter</button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
